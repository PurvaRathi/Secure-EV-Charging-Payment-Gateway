<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="container py-5">
    <nav class="mb-4">
        <a href="/" class="btn btn-outline-info">← Back to Gateway</a>
    </nav>

    <div class="glass-card mx-auto" style="max-width: 600px;">
        <h2 class="text-info">EV Owner Wallet</h2>
        <div class="alert alert-info">Current Balance: ₹<span id="bal">0.00</span></div>
        <select id="fid_select" class="form-select bg-dark text-white border-info mb-3"></select>
        <button class="btn btn-outline-info w-100 mb-3" onclick="simulateScan()">SCAN QR CODE</button>
        <div id="scan-result" class="mb-3 p-2 border border-success rounded text-success" style="display:none;">
            ✔ Scanned ASCON VFID: <span id="vfid_display" class="fw-bold"></span>
        </div>
        <input type="text" id="vmid_in" placeholder="Enter VMID (e.g. VMID-1234)" class="form-control mb-2">
        <input type="number" id="amt" placeholder="Amount (₹)" class="form-control mb-2">
        <input type="password" id="pin" placeholder="Security PIN" class="form-control mb-3">
        <button onclick="pay()" class="btn btn-success w-100 py-3 fw-bold">AUTHORIZE PAYMENT</button>
    </div>

    <script>
        async function loadFranchises() {
            const res = await fetch('/api/data');
            const data = await res.json();
            const select = document.getElementById('fid_select');
            select.innerHTML = '<option value="">-- Choose a Station --</option>';
            for (let id in data.franchises) {
                let opt = document.createElement('option');
                opt.value = id; opt.innerHTML = `${data.franchises[id].name} (${data.franchises[id].zone})`;
                select.appendChild(opt);
            }
        }
        async function simulateScan() {
            const fid = document.getElementById('fid_select').value;
            if(!fid) return alert("Select station");
            const res = await fetch('/api/get_vfid/' + fid);
            const data = await res.json();
            document.getElementById('scan-result').style.display = 'block';
            document.getElementById('vfid_display').innerText = data.vfid;
        }
        async function pay() {
            const res = await fetch('/api/pay', {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    vmid: document.getElementById('vmid_in').value,
                    fid: document.getElementById('fid_select').value, 
                    amount: document.getElementById('amt').value,
                    pin: document.getElementById('pin').value
                })
            });
            const data = await res.json();
            if(data.status === "success") {
                alert("Payment Successful!");
                document.getElementById('bal').innerText = data.balance.toFixed(2);
            } else { alert("Error: " + data.message); }
        }
        document.getElementById('vmid_in').addEventListener('input', async (e) => {
            if (e.target.value.length >= 9) {
                const res = await fetch('/api/data');
                const data = await res.json();
                if (data.users[e.target.value]) document.getElementById('bal').innerText = data.users[e.target.value].balance.toFixed(2);
            }
        });
        loadFranchises();
    </script>
</body>
</html>
