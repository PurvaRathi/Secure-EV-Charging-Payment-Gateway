<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="container py-5">
    <nav class="mb-4">
        <a href="/" class="btn btn-outline-info">← Back to Gateway</a>
    </nav>

    <div class="glass-card mx-auto" style="max-width: 500px;">
        <h2>Grid Registration</h2>
        <select id="role" class="form-select mb-3" onchange="togglePhone()">
            <option value="user">EV Owner</option>
            <option value="franchise">Station Franchise</option>
        </select>
        <input type="text" id="name" placeholder="Full Name" class="form-control mb-3">
        <input type="text" id="phone" placeholder="Phone Number" class="form-control mb-3">
        <input type="text" id="zone" placeholder="Zone (for Franchise)" class="form-control mb-3" style="display:none;">
        <input type="password" id="pin" placeholder="Security PIN" class="form-control mb-3">
        <button onclick="reg()" class="btn btn-primary w-100">Register with SHA-3</button>
        <div id="result" class="mt-4 p-3 bg-dark text-info border border-info rounded" style="word-break: break-all; display:none;"></div>
    </div>

    <script>
        function togglePhone() {
            const role = document.getElementById('role').value;
            document.getElementById('zone').style.display = (role === 'franchise') ? 'block' : 'none';
            document.getElementById('phone').style.display = (role === 'user') ? 'block' : 'none';
        }
        async function reg() {
            const res = await fetch('/api/register', {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    role: document.getElementById('role').value, 
                    name: document.getElementById('name').value, 
                    phone: document.getElementById('phone').value,
                    zone: document.getElementById('zone').value, 
                    pin: document.getElementById('pin').value
                })
            });
            const data = await res.json();
            const resDiv = document.getElementById('result');
            resDiv.style.display = 'block';
            resDiv.innerHTML = `<div><strong>SHA-3 ID:</strong> ${data.id}</div>` + 
                               (data.vmid ? `<div class="mt-2 text-warning"><strong>VMID:</strong> ${data.vmid}</div>` : '');
        }
    </script>
</body>
</html>
