<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="container py-5 text-center">
    <div class="glass-card d-inline-block">
        <h3>Charging Kiosk</h3>
        <input type="text" id="fid_in" placeholder="Enter Franchise ID" class="form-control mb-3">
        <button onclick="gen()" class="btn btn-info">Generate LWC QR</button>
        <div id="qr_box" class="mt-4"></div>
    </div>
    <script>
        async function gen() {
            const fid = document.getElementById('fid_in').value;
            const res = await fetch('/api/get_vfid/' + fid);
            const data = await res.json();
            document.getElementById('qr_box').innerHTML = `
                <p>Scan to Pay (LWC Dynamic Hash): <b>${data.vfid}</b></p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${data.vfid}">`;
        }
    </script>
</body>
